
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>TommyZeigt – Private Trading Terminal</title>
<link rel="stylesheet" href="style.css">
<script defer src="script.js"></script>
</head>
<body>

<div class="terminal-noise"></div>
<div class="chart-lines"></div>

<header class="terminal-header">
    <div class="status-bar">
        <span>MARKET: XAUUSD</span>
        <span>STATUS: ACTIVE</span>
        <span>SINCE: 06.02.2026</span>
    </div>
</header>

<section class="hero">
    <h1 class="brand">TommyZeigt</h1>
    <h2 class="subtitle">Private Trading Terminal</h2>
    <p class="tagline">Dokumentierte Gold-Performance in Echtzeit</p>
    <div class="buttons">
        <a href="#dashboard" class="btn">Performance öffnen</a>
        <a href="copytrading.html" class="btn-outline">Copytrading</a>
    </div>
</section>

<section id="dashboard" class="dashboard-section">
    <h2>LIVE PERFORMANCE</h2>
    <div class="dashboard">
        <div class="panel">
            <div class="label">Gesamtgewinn</div>
            <div class="metric" data-target="128">0</div>
        </div>
        <div class="panel">
            <div class="label">Trefferquote</div>
            <div class="metric" data-target="74">0</div>
        </div>
        <div class="panel">
            <div class="label">Profit Faktor</div>
            <div class="metric" data-target="2.3">0</div>
        </div>
    </div>
</section>

<footer class="terminal-footer">
    Keine Anlageberatung. Nur Dokumentation eigener Trades.
</footer>

</body>
</html>
